<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Office - Audio Game</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <header>
        <div class="logo-container">
            <!-- Small logo - The Office style -->
            <svg width="150" height="40" viewBox="0 0 150 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="30" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="#1a1a1a">THE OFFICE</text>
            </svg>
        </div>
        <h1>Audio Game</h1>
    </header>

    <main>
        <div id="status-badge" class="status-badge status-ready">Ready to Scan</div>

        <!-- Section 1: SCANNING -->
        <div id="scan-section">
            <div id="scanner-container">
                <div id="reader"></div>
            </div>
        </div>

        <!-- Section 2: PLAYBACK -->
        <div id="play-section" style="display: none;">
            <div class="audio-info">
                <audio id="main-audio" src=""></audio>
            </div>
            <div class="controls">
                <button id="replay-btn" class="btn-primary">Replay Audio</button>
                <button id="next-btn" class="btn-secondary">Scan Next</button>
            </div>
        </div>
    </main>

    <!-- <footer>
        Dunder Mifflin Paper Company, Inc.
    </footer> -->

    <script src="js/app.js"></script>
</body>
</html>
